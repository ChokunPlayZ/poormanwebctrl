version: 2

builds:
  - id: poorman
    main: ./cmd/poorman
    binary: poorman
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/chokunplayz/poormanwebctrl/internal/app.version={{.Version}}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - formats: [tar.gz]

checksum:
  name_template: checksums.txt

release:
  draft: false
  prerelease: auto
