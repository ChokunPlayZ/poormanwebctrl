version: 2

project_name: poorman

builds:
  - id: poorman
    main: ./cmd/poorman
    binary: poorman
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/chokunplayz/poormanwebctrl/internal/app.version={{.Version}}
    goos:
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

release:
  draft: false
  prerelease: auto
