name: Build

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test ./...

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: '0'
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build binary
        run: go build -trimpath -ldflags '-s -w' -o 'dist/poorman-${{ matrix.goos }}-${{ matrix.goarch }}' ./cmd/poorman
      - uses: actions/upload-artifact@v4
        with:
          name: poorman-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/poorman-${{ matrix.goos }}-${{ matrix.goarch }}
          if-no-files-found: error
